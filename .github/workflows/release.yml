name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Signed arm64 release APK
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: native/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Validate release configuration
        env:
          KEYSTORE_BASE64: ${{ secrets.LOCALANT_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.LOCALANT_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LOCALANT_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LOCALANT_RELEASE_KEY_PASSWORD }}
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid release tag: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          test -n "$KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.LOCALANT_RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/localant-android-release.p12"
          chmod 600 "$RUNNER_TEMP/localant-android-release.p12"

      - name: Build signed release APK
        env:
          LOCALANT_BUILD_TSNET: "1"
          LOCALANT_NATIVE_TARGETS: android/arm64
          LOCALANT_VERSION_NAME: ${{ env.RELEASE_TAG }}
          LOCALANT_VERSION_CODE: ${{ github.run_number }}
          LOCALANT_RELEASE_STORE_FILE: ${{ runner.temp }}/localant-android-release.p12
          LOCALANT_RELEASE_STORE_PASSWORD: ${{ secrets.LOCALANT_RELEASE_STORE_PASSWORD }}
          LOCALANT_RELEASE_KEY_ALIAS: ${{ secrets.LOCALANT_RELEASE_KEY_ALIAS }}
          LOCALANT_RELEASE_KEY_PASSWORD: ${{ secrets.LOCALANT_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew scripts/build-native.sh
          export LOCALANT_VERSION_NAME="${RELEASE_TAG#v}"
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/28.2.13676358"
          ./gradlew clean lintRelease testReleaseUnitTest assembleRelease --no-daemon

      - name: Verify and package APK
        run: |
          mkdir -p dist
          APK="app/build/outputs/apk/release/app-release.apk"
          OUTPUT="dist/localant-android-${RELEASE_TAG}-arm64.apk"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK"
          cp "$APK" "$OUTPUT"
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"
          unzip -l "$OUTPUT" | grep 'lib/arm64-v8a/libgojni.so'

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: localant-android-${{ env.RELEASE_TAG }}-arm64
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: LocalAnt Android ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: true
          files: dist/*
